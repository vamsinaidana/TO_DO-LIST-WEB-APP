<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST-APP</title>
    <link rel="stylesheet" href="styles.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="todo-container">
  <h3 class="text-center mb-4">✨ Todo List</h3>

  <div class="mb-2">
    <input type="text" id="todoInput" class="form-control" placeholder="Add a new task">
  </div>

  <div class="mb-3">
    <input type="datetime-local" id="todoDateTime" class="form-control">
  </div>

  <div class="d-grid mb-3">
    <button class="btn btn-primary" onclick="addTodo()">Add Task</button>
  </div>

  <ul id="todoList" class="list-unstyled"></ul>
</div>

 <script src="script.js"></script>   
</body>
</html>
